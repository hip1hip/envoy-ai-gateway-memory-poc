# Body Mutation 검증용 AIGatewayRoute manifest.
# 목적: v0.5에서 backendRef.bodyMutation.set이 요청 body의 top-level model field를 바꾸는지 확인한다.
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: AIGatewayRoute
metadata:
  name: envoy-ai-gateway-basic
  namespace: default
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-ai-gateway-basic
  rules:
    - matches:
        - headers:
            - name: x-ai-eg-model
              type: Exact
              value: some-cool-self-hosted-model
      backendRefs:
        - name: envoy-ai-gateway-basic-testupstream
          bodyMutation:
            set:
              - path: model
                value: '"body-mutated-model"'
