# Memory PoC skeleton ExtProc image 적용용 GatewayConfig.
# 목적: Redis 없이 request body 읽기와 dummy memory message 주입을 검증한다.
apiVersion: aigateway.envoyproxy.io/v1alpha1
kind: GatewayConfig
metadata:
  name: memory-poc-gateway-config
  namespace: default
spec:
  extProc:
    kubernetes:
      image: envoy-ai-gateway-memory-extproc:v0.5.0-memory-skeleton
      env:
        - name: MEMORY_POC_MARKER
          value: memory-extproc-skeleton
        - name: MEMORY_POC_DUMMY_INJECTION
          value: "true"
        - name: MEMORY_TTL_SECONDS
          value: "3600"
        - name: MEMORY_MAX_HISTORY_MESSAGES
          value: "20"
      resources:
        requests:
          cpu: 50m
          memory: 64Mi
        limits:
          cpu: 250m
          memory: 256Mi
